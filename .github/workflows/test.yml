name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scalafmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
        scala: ["2.12.18", "2.13.16", "3.3.1"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - uses: isbang/compose-action@v3.0.0
        with:
          compose-file: ./compose.yml
      - name: Wait for MySQL to be ready
        run: |
          for _ in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3307 -uroot -ppassword --silent; then
              echo "MySQL is up!"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
      - run: sbt "++${{ matrix.scala }}!" test

  test-all:
    if: always()
    needs: [scalafmt, test]
    runs-on: ubuntu-latest
    steps:
      - run: if [[ "${{ needs.scalafmt.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then exit 1; fi
